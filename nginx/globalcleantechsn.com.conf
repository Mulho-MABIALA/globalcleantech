# ── Nginx hôte (sur la VPS, HORS Docker) — reverse proxy vers le conteneur "app" ──
# Ce fichier est un EXEMPLE à adapter puis copier sur le serveur dans :
#   /etc/nginx/sites-available/globalcleantechsn.com.conf
# puis activer avec :
#   sudo ln -s /etc/nginx/sites-available/globalcleantechsn.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Le bloc SSL (443) est généré automatiquement par `certbot --nginx` — ne pas
# l'écrire à la main, lancez juste certbot après avoir activé le bloc HTTP ci-dessous.

server {
    listen 80;
    listen [::]:80;
    server_name globalcleantechsn.com www.globalcleantechsn.com;

    client_max_body_size 15M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
